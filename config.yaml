scoring:
  threshold: 6.0
  topics:
    - AI and machine learning
    - engineering leadership
    - fintech infrastructure
    - developer tools
    - software architecture

llm:
  # High-volume tasks (scoring, sentiment, classification) — cheap Anthropic model
  scoring_model: "claude-haiku-4"
  scoring_provider: "anthropic"
  # Quality tasks (drafting, replies, engagement) — top-tier Anthropic model
  drafting_model: "claude-opus-4-6"
  drafting_provider: "anthropic"

voice_profile:
  tone: "Thoughtful, opinionated, direct. Not corporate-speak."
  style: "Short paragraphs. Lead with insight, not summary. Ask questions that spark discussion."
  topics:
    - AI and machine learning in practice
    - engineering leadership and culture
    - fintech infrastructure
    - developer tools and productivity
  avoid:
    - "Generic motivational platitudes"
    - "Hashtag spam"
    - "Obvious statements everyone agrees with"
    - "Starting with 'I'm excited to announce...'"
  examples:
    - "The AI agent hype cycle is peaking, but the real unlock isn't autonomy — it's better human-AI handoff. Most agent failures I've seen aren't capability gaps. They're trust calibration problems."
    - "Hot take: the best engineering managers aren't the ones who shield their teams from everything. They're the ones who give context and let adults make decisions."

scheduling:
  windows:
    - days: weekdays
      start: "08:00"
      end: "09:00"
    - days: weekdays
      start: "12:00"
      end: "13:00"
  max_per_day: 2
  min_gap_minutes: 120

watchlist:
  poll_interval_hours: 4  # how often to poll watchlisted people's feeds

linkedin:
